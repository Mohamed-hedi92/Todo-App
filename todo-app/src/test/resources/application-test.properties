# === Test-Konfiguration ===

# Eigene Test-DB (anderer Name als Produktion, damit keine Konflikte entstehen)
spring.datasource.url=jdbc:h2:mem:todo-test-db;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Schema f³r jeden Test neu aufbauen
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2-Console in Tests deaktiviert (nicht n÷tig, sicherer)
spring.h2.console.enabled=false

# Weniger Logging im Test f³r ³bersichtlichere Ausgaben
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.example.todo=DEBUG

# Server-Port (falls WebEnvironment.RANDOM_PORT genutzt wird, wird dies ignoriert)
server.port=0